[phases.setup]
nixPkgs = [
  "php84",
  "php84Packages.composer",
  "nodejs_20"
]

[phases.build]
cmds = [
  "composer install --optimize-autoloader --no-dev --no-interaction",
  "npm install",
  "npm run build",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan config:clear && php artisan cache:clear && php artisan migrate --force && php artisan db:seed --force && php artisan storage:link && php artisan optimize && php -S 0.0.0.0:$PORT -t public"